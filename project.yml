name: MDViewer
settings:
  base:
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    SWIFT_VERSION: "5.9"
    GENERATE_INFOPLIST_FILE: NO
targets:
  cmark-gfm:
    type: library.static
    platform: macOS
    sources:
      - Vendor/cmark-gfm/src
    settings:
      HEADER_SEARCH_PATHS:
        - $(SRCROOT)/Vendor/cmark-gfm/src/include
        - $(SRCROOT)/Vendor/cmark-gfm/extensions/include
      MODULEMAP_FILE: $(SRCROOT)/Vendor/cmark-gfm/src/include/module.modulemap
      GCC_C_LANGUAGE_STANDARD: c99
      CLANG_ENABLE_MODULES: NO
    excludes:
      - "*.re"
      - "*.in"
      - "*.pc.in"
      - CMakeLists.txt
  cmark-gfm-extensions:
    type: library.static
    platform: macOS
    sources:
      - Vendor/cmark-gfm/extensions
    settings:
      HEADER_SEARCH_PATHS:
        - $(SRCROOT)/Vendor/cmark-gfm/src/include
        - $(SRCROOT)/Vendor/cmark-gfm/extensions/include
      MODULEMAP_FILE: $(SRCROOT)/Vendor/cmark-gfm/src/include/module.modulemap
      GCC_C_LANGUAGE_STANDARD: c99
      CLANG_ENABLE_MODULES: NO
    dependencies:
      - target: cmark-gfm
    excludes:
      - "*.re"
      - CMakeLists.txt
  MDViewer:
    type: application
    platform: macOS
    sources:
      - MDViewer
    resources:
      - MDViewer/Resources
    settings:
      INFOPLIST_FILE: MDViewer/Info.plist
      PRODUCT_BUNDLE_IDENTIFIER: com.mdviewer.app
      HEADER_SEARCH_PATHS:
        - $(SRCROOT)/Vendor/cmark-gfm/src/include
        - $(SRCROOT)/Vendor/cmark-gfm/extensions/include
    dependencies:
      - target: cmark-gfm
      - target: cmark-gfm-extensions
  MDViewerTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - MDViewerTests
    settings:
      GENERATE_INFOPLIST_FILE: YES
      HEADER_SEARCH_PATHS:
        - $(SRCROOT)/Vendor/cmark-gfm/src/include
        - $(SRCROOT)/Vendor/cmark-gfm/extensions/include
    dependencies:
      - target: MDViewer
